name: Deploy Oracle Gateway V2

on:
  workflow_dispatch:
    inputs:
      network:
        description: Target network
        type: choice
        required: true
        default: esquiline
        options:
          - esquiline
          - subura
          - marcus
      default_max_staleness:
        description: defaultMaxStaleness in seconds (factory-wide)
        type: string
        required: false
        default: "300"
      run_seed_feeds:
        description: Run deploy-seed-feeds.ts after core deploy
        type: boolean
        required: false
        default: true
      run_verification:
        description: Run test-feeds-v2.ts against the new deployment
        type: boolean
        required: false
        default: true
      force_redeploy:
        description: Redeploy core contracts even if OracleGatewayV2 block already exists
        type: boolean
        required: false
        default: false
      open_pr:
        description: Open a bot PR with the updated deployments/<network>.json
        type: boolean
        required: false
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      - name: Export deploy key for ${{ inputs.network }}
        env:
          DEPLOY_KEY: ${{ secrets.ROME_DEVNET_PRIVATE_KEY }}
        run: |
          if [ -z "$DEPLOY_KEY" ]; then
            echo "::error::Secret ROME_DEVNET_PRIVATE_KEY is not configured in repo settings"
            exit 1
          fi
          # Normalize: hardhat/viem requires 0x prefix; accept either form in the secret.
          case "$DEPLOY_KEY" in
            0x*) ;;
            *)   DEPLOY_KEY="0x${DEPLOY_KEY}" ;;
          esac
          echo "::add-mask::$DEPLOY_KEY"
          case "${{ inputs.network }}" in
            esquiline) VAR=ESQUILINE_PRIVATE_KEY ;;
            subura)    VAR=SUBURA_PRIVATE_KEY ;;
            marcus)    VAR=MARCUS_PRIVATE_KEY ;;
            *)         echo "::error::Unknown network: ${{ inputs.network }}" ; exit 1 ;;
          esac
          echo "${VAR}=${DEPLOY_KEY}" >> "$GITHUB_ENV"

      - run: npx hardhat compile

      - name: Deploy core (implementations + factory + reader)
        env:
          DEFAULT_MAX_STALENESS: ${{ inputs.default_max_staleness }}
          FORCE_REDEPLOY: ${{ inputs.force_redeploy && '1' || '' }}
        run: npx hardhat run scripts/oracle/deploy-v2-polish.ts --network ${{ inputs.network }}

      - name: Seed feeds
        if: ${{ inputs.run_seed_feeds }}
        run: npx hardhat run scripts/oracle/deploy-seed-feeds.ts --network ${{ inputs.network }}

      - name: Verify feeds
        if: ${{ inputs.run_verification }}
        run: npx hardhat run scripts/oracle/test-feeds-v2.ts --network ${{ inputs.network }}

      - name: Open PR with deployment artifacts
        if: ${{ inputs.open_pr }}
        uses: peter-evans/create-pull-request@v6
        with:
          branch: deploy/oracle-${{ inputs.network }}-${{ github.run_id }}
          base: master
          title: "deploy(oracle): OracleGatewayV2 -> ${{ inputs.network }}"
          commit-message: |
            deploy(oracle): OracleGatewayV2 -> ${{ inputs.network }}

            Triggered via workflow_dispatch run ${{ github.run_id }} by @${{ github.actor }}.
          body: |
            Auto-generated by `.github/workflows/deploy-oracle.yml`.

            - Network: `${{ inputs.network }}`
            - `defaultMaxStaleness`: `${{ inputs.default_max_staleness }}`
            - Seed feeds: `${{ inputs.run_seed_feeds }}`
            - Verification: `${{ inputs.run_verification }}`
            - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Review `deployments/${{ inputs.network }}.json` and merge.
          add-paths: deployments/${{ inputs.network }}.json
          delete-branch: true
